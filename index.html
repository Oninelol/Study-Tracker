<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --accent3: #6affdc;
    --text: #e8e6f0;
    --muted: #6b6880;
    --card: #16162080;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, #7c6aff18 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 80%, #ff6a9b12 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 60% 30%, #6affdc0a 0%, transparent 60%);
    pointer-events:none; z-index:0;
  }
  .app { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:40px 24px 80px; }

  header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:32px; flex-wrap:wrap; gap:16px; }
  .logo { font-size:2rem; font-weight:800; letter-spacing:-0.04em; line-height:1; }
  .logo span { color:var(--accent); }
  .total-today { font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:var(--muted); text-align:right; }
  .total-today strong { display:block; font-size:1.6rem; color:var(--accent3); font-weight:500; letter-spacing:-0.02em; }

  .nav-tabs { display:flex; gap:4px; margin-bottom:36px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:4px; width:fit-content; }
  .nav-tab { font-family:'Syne',sans-serif; font-weight:600; font-size:0.82rem; padding:8px 20px; border:none; border-radius:10px; background:none; color:var(--muted); cursor:pointer; transition:all .2s; }
  .nav-tab.active { background:var(--accent); color:#fff; }
  .nav-tab:hover:not(.active) { color:var(--text); }

  .page { display:none; }
  .page.active { display:block; }

  #active-banner { display:none; align-items:center; justify-content:space-between; background:linear-gradient(135deg,var(--accent)22,var(--accent2)11); border:1px solid var(--accent)55; border-radius:16px; padding:16px 24px; margin-bottom:32px; gap:16px; flex-wrap:wrap; animation:pulse-border 2s ease infinite; }
  @keyframes pulse-border { 0%,100%{border-color:var(--accent)55} 50%{border-color:var(--accent)cc} }
  #active-banner.show { display:flex; }
  .banner-left { display:flex; align-items:center; gap:12px; }
  .dot { width:10px; height:10px; border-radius:50%; background:var(--accent2); animation:blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .banner-subject { font-weight:700; font-size:1.1rem; }
  .banner-time { font-family:'JetBrains Mono',monospace; font-size:2rem; font-weight:500; color:var(--accent3); letter-spacing:-0.02em; }
  .btn-stop { background:var(--accent2); color:#fff; border:none; border-radius:10px; padding:10px 24px; font-family:'Syne',sans-serif; font-weight:700; font-size:0.9rem; cursor:pointer; transition:opacity .2s,transform .1s; }
  .btn-stop:hover { opacity:.85; transform:scale(1.02); }

  .section-label { font-family:'JetBrains Mono',monospace; font-size:0.7rem; letter-spacing:0.12em; color:var(--muted); text-transform:uppercase; margin-bottom:16px; }
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:8px; }

  .add-row { display:flex; gap:10px; margin-bottom:40px; }
  .add-row input { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 18px; color:var(--text); font-family:'Syne',sans-serif; font-size:0.95rem; outline:none; transition:border-color .2s; }
  .add-row input::placeholder { color:var(--muted); }
  .add-row input:focus { border-color:var(--accent)88; }
  .color-pick { width:48px; height:48px; border-radius:12px; border:1px solid var(--border); padding:4px; background:var(--surface); cursor:pointer; overflow:hidden; }
  .color-pick input[type="color"] { width:100%; height:100%; border:none; background:none; cursor:pointer; padding:0; }
  .btn-add { background:var(--accent); color:#fff; border:none; border-radius:12px; padding:14px 24px; font-family:'Syne',sans-serif; font-weight:700; font-size:0.9rem; cursor:pointer; white-space:nowrap; transition:opacity .2s,transform .1s; }
  .btn-add:hover { opacity:.85; transform:scale(1.02); }

  .subjects-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:16px; margin-bottom:48px; }
  .subject-card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:20px; backdrop-filter:blur(12px); transition:border-color .2s,transform .2s; animation:slideIn .3s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .subject-card:hover { transform:translateY(-2px); }
  .subject-card.active-card { border-color:var(--accent)99; }
  .card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .card-name-row { display:flex; align-items:center; gap:10px; }
  .subject-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .subject-name { font-weight:700; font-size:1rem; max-width:160px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .btn-delete { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; padding:4px; border-radius:6px; transition:color .2s,background .2s; line-height:1; }
  .btn-delete:hover { color:var(--accent2); background:var(--accent2)18; }
  .card-time { font-family:'JetBrains Mono',monospace; font-size:2.2rem; font-weight:500; letter-spacing:-0.03em; margin-bottom:4px; line-height:1; }
  .card-sessions { font-size:0.75rem; color:var(--muted); font-family:'JetBrains Mono',monospace; margin-bottom:16px; }
  .progress-bar { height:4px; background:var(--border); border-radius:99px; margin-bottom:16px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:99px; transition:width .6s ease; }
  .btn-start { width:100%; background:none; border:1px solid var(--border); border-radius:10px; padding:10px; color:var(--text); font-family:'Syne',sans-serif; font-weight:600; font-size:0.85rem; cursor:pointer; transition:all .2s; }
  .btn-start:hover { background:var(--accent)18; border-color:var(--accent)66; color:var(--accent); }
  .btn-start:disabled { opacity:.4; cursor:not-allowed; }

  .sessions-section { margin-bottom:48px; }
  .sessions-list { display:flex; flex-direction:column; gap:8px; }
  .session-item { display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 16px; font-family:'JetBrains Mono',monospace; font-size:.8rem; animation:slideIn .3s ease; }
  .session-color { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .session-name { flex:1; font-family:'Syne',sans-serif; font-weight:600; font-size:.85rem; }
  .session-duration { color:var(--accent3); }
  .session-time { color:var(--muted); font-size:.72rem; }
  .no-sessions { color:var(--muted); font-size:.85rem; font-family:'JetBrains Mono',monospace; }
  .empty { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-icon { font-size:3rem; margin-bottom:12px; }
  .empty p { font-size:.9rem; }

  /* ── Analytics ── */
  .period-nav { display:flex; align-items:center; gap:10px; }
  .btn-period { background:none; border:1px solid var(--border); border-radius:8px; color:var(--muted); cursor:pointer; padding:6px 14px; font-family:'JetBrains Mono',monospace; font-size:.75rem; transition:all .2s; }
  .btn-period:hover { color:var(--text); border-color:var(--accent)55; }
  .period-label { font-family:'JetBrains Mono',monospace; font-size:.8rem; color:var(--text); min-width:170px; text-align:center; }

  .chart-type-btns { display:flex; gap:4px; }
  .btn-chart-type { background:none; border:1px solid var(--border); border-radius:8px; color:var(--muted); cursor:pointer; padding:6px 12px; font-size:.75rem; font-family:'JetBrains Mono',monospace; transition:all .2s; }
  .btn-chart-type.active { background:var(--accent)22; border-color:var(--accent)66; color:var(--accent); }
  .btn-chart-type:hover:not(.active) { color:var(--text); }

  .stat-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:12px; margin-bottom:24px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; }
  .stat-label { font-family:'JetBrains Mono',monospace; font-size:.65rem; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
  .stat-value { font-family:'JetBrains Mono',monospace; font-size:1.4rem; font-weight:500; letter-spacing:-0.02em; }

  .chart-wrap { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px; margin-bottom:24px; }
  .chart-canvas { width:100%; overflow-x:auto; }

  .bars-chart { display:flex; align-items:flex-end; gap:6px; height:160px; min-width:280px; }
  .bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end; min-width:24px; }
  .bar-body { width:100%; border-radius:6px 6px 0 0; cursor:pointer; position:relative; }
  .bar-body:hover { opacity:.8; }
  .bar-tooltip { position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:#0d0d14; border:1px solid var(--border); border-radius:8px; padding:5px 9px; font-family:'JetBrains Mono',monospace; font-size:.68rem; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .15s; z-index:10; color:var(--text); }
  .bar-body:hover .bar-tooltip { opacity:1; }
  .bar-lbl { font-family:'JetBrains Mono',monospace; font-size:.62rem; color:var(--muted); text-align:center; }
  .bar-lbl.today-lbl { color:var(--accent); font-weight:600; }

  .bar-stack { width:100%; display:flex; flex-direction:column; justify-content:flex-end; border-radius:6px 6px 0 0; overflow:hidden; cursor:pointer; }
  .stack-seg { width:100%; }

  .line-svg { width:100%; height:160px; overflow:visible; display:block; }

  .donut-row { display:flex; align-items:center; gap:32px; flex-wrap:wrap; }
  .donut-wrap { position:relative; flex-shrink:0; }
  .donut-svg { width:160px; height:160px; }
  .donut-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:none; }
  .donut-center-val { font-family:'JetBrains Mono',monospace; font-size:1rem; font-weight:500; }
  .donut-center-lbl { font-size:.65rem; color:var(--muted); font-family:'JetBrains Mono',monospace; }
  .donut-legend { display:flex; flex-direction:column; gap:8px; flex:1; min-width:140px; }
  .legend-item { display:flex; align-items:center; gap:8px; font-size:.8rem; }
  .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .legend-pct { font-family:'JetBrains Mono',monospace; color:var(--muted); font-size:.75rem; margin-left:auto; white-space:nowrap; }

  .breakdown-table { width:100%; border-collapse:collapse; }
  .breakdown-table th { font-family:'JetBrains Mono',monospace; font-size:.65rem; letter-spacing:.1em; color:var(--muted); text-transform:uppercase; padding:0 16px 12px; text-align:left; }
  .breakdown-table td { padding:10px 16px; border-top:1px solid var(--border); font-size:.85rem; vertical-align:middle; }
  .bd-name { display:flex; align-items:center; gap:8px; font-weight:600; }
  .bd-bar-wrap { flex:1; background:var(--border); border-radius:99px; height:5px; overflow:hidden; min-width:60px; }
  .bd-bar-fill { height:100%; border-radius:99px; }
  .bd-pct { font-family:'JetBrains Mono',monospace; font-size:.75rem; color:var(--muted); white-space:nowrap; }

  .heatmap-cell { width:13px; height:13px; border-radius:3px; background:var(--border); cursor:pointer; flex-shrink:0; }
  .heatmap-cell:hover { opacity:.75; }
  .heatmap-col { display:flex; flex-direction:column; gap:3px; }
  .heatmap-day-lbl { height:13px; font-family:'JetBrains Mono',monospace; font-size:.6rem; color:var(--muted); line-height:13px; }

  #toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 24px; font-size:.85rem; font-family:'JetBrains Mono',monospace; color:var(--accent3); transition:transform .4s cubic-bezier(.34,1.56,.64,1); z-index:999; white-space:nowrap; pointer-events:none; }
  #toast.show { transform:translateX(-50%) translateY(0); }

  @media(max-width:600px) {
    .logo { font-size:1.5rem; }
    .subjects-grid { grid-template-columns:1fr; }
    .banner-time { font-size:1.5rem; }
    .stat-cards { grid-template-columns:1fr 1fr; }
    .section-header { flex-direction:column; align-items:flex-start; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">Study<span>.</span>Track</div>
    <div class="total-today">
      <span>today's total</span>
      <strong id="total-display">0h 00m</strong>
    </div>
  </header>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage('tracker')">Tracker</button>
    <button class="nav-tab" onclick="switchPage('weekly')">Weekly</button>
    <button class="nav-tab" onclick="switchPage('monthly')">Monthly</button>
  </div>

  <div id="active-banner">
    <div class="banner-left">
      <div class="dot"></div>
      <div>
        <div style="font-size:.7rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:2px">NOW STUDYING</div>
        <div class="banner-subject" id="banner-name">—</div>
      </div>
    </div>
    <div class="banner-time" id="banner-time">00:00</div>
    <button class="btn-stop" onclick="stopTimer()">■ Stop</button>
  </div>

  <!-- TRACKER PAGE -->
  <div id="page-tracker" class="page active">
    <div class="section-label">Subjects</div>
    <div class="add-row">
      <input type="text" id="subject-input" placeholder="Add a subject (e.g. Math, CS, History...)" maxlength="30" />
      <div class="color-pick"><input type="color" id="color-input" value="#7c6aff"></div>
      <button class="btn-add" onclick="addSubject()">+ Add</button>
    </div>
    <div class="subjects-grid" id="subjects-grid">
      <div class="empty" id="empty-subjects">
        <div class="empty-icon">📚</div>
        <p>Add a subject to start tracking your study sessions.</p>
      </div>
    </div>
    <div class="sessions-section">
      <div class="section-label">Today's Sessions</div>
      <div class="sessions-list" id="sessions-list">
        <div class="no-sessions" id="no-sessions">No sessions yet today.</div>
      </div>
    </div>
  </div>

  <!-- WEEKLY PAGE -->
  <div id="page-weekly" class="page">
    <div class="section-header">
      <div class="period-nav">
        <button class="btn-period" onclick="weekOffset(-1)">◀</button>
        <div class="period-label" id="week-label">—</div>
        <button class="btn-period" onclick="weekOffset(1)">▶</button>
      </div>
      <div class="chart-type-btns">
        <button class="btn-chart-type active" onclick="setWeekChart('bar')" id="wcb-bar">Bar</button>
        <button class="btn-chart-type" onclick="setWeekChart('stacked')" id="wcb-stacked">Stacked</button>
        <button class="btn-chart-type" onclick="setWeekChart('line')" id="wcb-line">Line</button>
      </div>
    </div>
    <div class="stat-cards" id="week-stats"></div>
    <div class="chart-wrap"><div class="chart-canvas" id="week-chart-canvas"></div></div>
    <div class="section-label">Subject Breakdown</div>
    <div class="chart-wrap"><div class="donut-row" id="week-donut-row"></div></div>
    <div class="section-label" style="margin-top:24px">Per-Subject Detail</div>
    <div class="chart-wrap" style="padding:16px 0"><table class="breakdown-table" id="week-breakdown-table"></table></div>
  </div>

  <!-- MONTHLY PAGE -->
  <div id="page-monthly" class="page">
    <div class="section-header">
      <div class="period-nav">
        <button class="btn-period" onclick="monthOffset(-1)">◀</button>
        <div class="period-label" id="month-label">—</div>
        <button class="btn-period" onclick="monthOffset(1)">▶</button>
      </div>
      <div class="chart-type-btns">
        <button class="btn-chart-type active" onclick="setMonthChart('heatmap')" id="mcb-heatmap">Heatmap</button>
        <button class="btn-chart-type" onclick="setMonthChart('bar')" id="mcb-bar">Bar</button>
        <button class="btn-chart-type" onclick="setMonthChart('stacked')" id="mcb-stacked">Stacked</button>
      </div>
    </div>
    <div class="stat-cards" id="month-stats"></div>
    <div class="chart-wrap"><div class="chart-canvas" id="month-chart-canvas"></div></div>
    <div class="section-label">Subject Breakdown</div>
    <div class="chart-wrap"><div class="donut-row" id="month-donut-row"></div></div>
    <div class="section-label" style="margin-top:24px">Per-Subject Detail</div>
    <div class="chart-wrap" style="padding:16px 0"><table class="breakdown-table" id="month-breakdown-table"></table></div>
  </div>

</div>
<div id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let subjects = JSON.parse(localStorage.getItem('st_subjects') || '[]');
let sessions  = JSON.parse(localStorage.getItem('st_sessions') || '[]');
let activeTimer = null;
let currentPage = 'tracker';
let weekChartType = 'bar';
let monthChartType = 'heatmap';
let weekDelta = 0;
let monthDelta = 0;

// ─── Helpers ─────────────────────────────────────────────────────────────────
const fmtHM = ms => { const m=Math.floor(ms/60000),h=Math.floor(m/60); return `${h}h ${String(m%60).padStart(2,'0')}m`; };
const fmtTimer = ms => { const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60); return h>0?`${h}h ${String(m%60).padStart(2,'0')}m`:`${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; };
const todayStr = () => new Date().toISOString().slice(0,10);
const dateStr  = d => d.toISOString().slice(0,10);
const save     = () => { localStorage.setItem('st_subjects',JSON.stringify(subjects)); localStorage.setItem('st_sessions',JSON.stringify(sessions)); };
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function hexAlpha(hex,a){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
function sessMs(dayArr){ return dayArr.reduce((a,d)=>a+sessions.filter(s=>s.date===d).reduce((b,s)=>b+s.duration,0),0); }
function bySubjMap(dayArr){
  const m={};
  sessions.filter(s=>dayArr.includes(s.date)).forEach(s=>{ if(!m[s.subjectId])m[s.subjectId]={name:s.subjectName,color:s.color,ms:0,count:0}; m[s.subjectId].ms+=s.duration; m[s.subjectId].count++; });
  return Object.values(m).sort((a,b)=>b.ms-a.ms);
}

// ─── Navigation ──────────────────────────────────────────────────────────────
function switchPage(p){
  currentPage=p;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',['tracker','weekly','monthly'][i]===p));
  if(p==='weekly') renderWeekly();
  if(p==='monthly') renderMonthly();
}

// ─── Timer ───────────────────────────────────────────────────────────────────
function startTimer(id){
  if(activeTimer) stopTimer();
  const sub=subjects.find(s=>s.id===id); if(!sub) return;
  activeTimer={subjectId:id,startTime:Date.now()};
  activeTimer.intervalId=setInterval(updateBanner,1000);
  document.getElementById('active-banner').classList.add('show');
  document.getElementById('banner-name').textContent=sub.name;
  updateBanner(); renderSubjects();
  toast(`▶ Started: ${sub.name}`);
}
function stopTimer(){
  if(!activeTimer) return;
  clearInterval(activeTimer.intervalId);
  const duration=Date.now()-activeTimer.startTime;
  const sub=subjects.find(s=>s.id===activeTimer.subjectId);
  if(sub&&duration>2000){
    sessions.push({id:Date.now(),subjectId:sub.id,subjectName:sub.name,color:sub.color,duration,date:todayStr(),endTime:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
    sub.totalMs=(sub.totalMs||0)+duration;
    save(); toast(`✓ Saved ${fmtHM(duration)} for ${sub.name}`);
  }
  document.getElementById('active-banner').classList.remove('show');
  activeTimer=null; render();
}
function updateBanner(){ if(!activeTimer) return; document.getElementById('banner-time').textContent=fmtTimer(Date.now()-activeTimer.startTime); }

// ─── Subjects ─────────────────────────────────────────────────────────────────
function addSubject(){
  const inp=document.getElementById('subject-input'),col=document.getElementById('color-input');
  const name=inp.value.trim(); if(!name){inp.focus();return;}
  if(subjects.find(s=>s.name.toLowerCase()===name.toLowerCase())){toast('Subject already exists!');return;}
  subjects.push({id:Date.now(),name,color:col.value,totalMs:0});
  inp.value=''; save(); render(); toast(`+ Added: ${name}`);
}
document.getElementById('subject-input').addEventListener('keydown',e=>{if(e.key==='Enter')addSubject();});
function deleteSubject(id){ if(activeTimer&&activeTimer.subjectId===id)stopTimer(); subjects=subjects.filter(s=>s.id!==id); save(); render(); }

// ─── Tracker Render ───────────────────────────────────────────────────────────
function render(){ renderSubjects(); renderSessions(); renderTotal(); if(currentPage==='weekly')renderWeekly(); if(currentPage==='monthly')renderMonthly(); }

function renderSubjects(){
  const grid=document.getElementById('subjects-grid'),empty=document.getElementById('empty-subjects');
  if(!subjects.length){grid.innerHTML='';grid.appendChild(empty);return;}
  const maxMs=Math.max(...subjects.map(s=>s.totalMs||0),1);
  grid.innerHTML=subjects.map(sub=>{
    const isActive=activeTimer&&activeTimer.subjectId===sub.id;
    const pct=Math.round(((sub.totalMs||0)/maxMs)*100);
    const tSess=sessions.filter(s=>s.subjectId===sub.id&&s.date===todayStr());
    const tMs=tSess.reduce((a,s)=>a+s.duration,0);
    return `<div class="subject-card ${isActive?'active-card':''}">
      <div class="card-top"><div class="card-name-row"><div class="subject-dot" style="background:${sub.color}"></div><div class="subject-name" title="${sub.name}">${sub.name}</div></div>
      <button class="btn-delete" onclick="deleteSubject(${sub.id})">✕</button></div>
      <div class="card-time" style="color:${sub.color}">${fmtHM(sub.totalMs||0)}</div>
      <div class="card-sessions">today: ${fmtHM(tMs)} · ${tSess.length} session${tSess.length!==1?'s':''}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${sub.color}"></div></div>
      <button class="btn-start" onclick="startTimer(${sub.id})" ${isActive?'disabled':''}>${isActive?'● Recording...':'▶ Start Session'}</button>
    </div>`;
  }).join('');
}
function renderSessions(){
  const list=document.getElementById('sessions-list'),noSess=document.getElementById('no-sessions');
  const today=sessions.filter(s=>s.date===todayStr()).reverse();
  if(!today.length){list.innerHTML='';list.appendChild(noSess);return;}
  list.innerHTML=today.slice(0,30).map(s=>`<div class="session-item"><div class="session-color" style="background:${s.color}"></div><div class="session-name">${s.subjectName}</div><div class="session-duration">${fmtHM(s.duration)}</div><div class="session-time">${s.endTime}</div></div>`).join('');
}
function renderTotal(){ document.getElementById('total-display').textContent=fmtHM(sessions.filter(s=>s.date===todayStr()).reduce((a,s)=>a+s.duration,0)); }

// ─── WEEKLY ───────────────────────────────────────────────────────────────────
function getWeekDays(delta=0){
  const now=new Date(),day=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-((day+6)%7)+delta*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return dateStr(d); });
}
function weekOffset(dir){ weekDelta+=dir; renderWeekly(); }
function setWeekChart(t){ weekChartType=t; ['bar','stacked','line'].forEach(x=>document.getElementById('wcb-'+x).classList.toggle('active',x===t)); renderWeekly(); }

function renderWeekly(){
  const days=getWeekDays(weekDelta);
  const labels=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const today=todayStr();
  const fmtD=s=>{ const d=new Date(s+'T12:00:00'); return d.toLocaleDateString([],{month:'short',day:'numeric'}); };
  document.getElementById('week-label').textContent=`${fmtD(days[0])} – ${fmtD(days[6])}`;

  const totalMs=sessMs(days);
  const dayMs=days.map(d=>sessions.filter(s=>s.date===d).reduce((a,s)=>a+s.duration,0));
  const studiedDays=dayMs.filter(v=>v>0).length;
  const maxDayMs=Math.max(...dayMs,1);
  const avgMs=studiedDays?Math.round(totalMs/studiedDays):0;

  document.getElementById('week-stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" style="color:var(--accent3)">${fmtHM(totalMs)}</div></div>
    <div class="stat-card"><div class="stat-label">Daily avg</div><div class="stat-value">${fmtHM(avgMs)}</div></div>
    <div class="stat-card"><div class="stat-label">Days active</div><div class="stat-value" style="color:var(--accent)">${studiedDays}<span style="font-size:.85rem;color:var(--muted)">/7</span></div></div>
    <div class="stat-card"><div class="stat-label">Best day</div><div class="stat-value" style="color:var(--accent2)">${fmtHM(maxDayMs===1?0:maxDayMs)}</div></div>`;

  const canvas=document.getElementById('week-chart-canvas');
  if(weekChartType==='bar')     canvas.innerHTML=buildBarChart(days,labels,today,dayMs,maxDayMs);
  else if(weekChartType==='stacked') canvas.innerHTML=buildStackedChart(days,labels,today,dayMs,maxDayMs);
  else                           canvas.innerHTML=buildLineChart(days,labels,today,dayMs);

  renderDonut('week-donut-row',days);
  renderBreakdownTable('week-breakdown-table',days);
}

// ─── MONTHLY ──────────────────────────────────────────────────────────────────
function getMonthDays(delta=0){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth()+delta;
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const days=[]; for(let d=new Date(first);d<=last;d.setDate(d.getDate()+1)) days.push(dateStr(new Date(d)));
  return days;
}
function monthOffset(dir){ monthDelta+=dir; renderMonthly(); }
function setMonthChart(t){ monthChartType=t; ['heatmap','bar','stacked'].forEach(x=>document.getElementById('mcb-'+x).classList.toggle('active',x===t)); renderMonthly(); }

function renderMonthly(){
  const days=getMonthDays(monthDelta);
  const today=todayStr();
  const refDate=new Date(new Date().getFullYear(),new Date().getMonth()+monthDelta,1);
  document.getElementById('month-label').textContent=refDate.toLocaleDateString([],{month:'long',year:'numeric'});

  const dayMs=days.map(d=>sessions.filter(s=>s.date===d).reduce((a,s)=>a+s.duration,0));
  const totalMs=dayMs.reduce((a,v)=>a+v,0);
  const studiedDays=dayMs.filter(v=>v>0).length;
  const maxDayMs=Math.max(...dayMs,1);
  const avgMs=studiedDays?Math.round(totalMs/studiedDays):0;
  const labels=days.map(d=>String(new Date(d+'T12:00:00').getDate()));

  document.getElementById('month-stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" style="color:var(--accent3)">${fmtHM(totalMs)}</div></div>
    <div class="stat-card"><div class="stat-label">Daily avg</div><div class="stat-value">${fmtHM(avgMs)}</div></div>
    <div class="stat-card"><div class="stat-label">Days active</div><div class="stat-value" style="color:var(--accent)">${studiedDays}<span style="font-size:.85rem;color:var(--muted)">/${days.length}</span></div></div>
    <div class="stat-card"><div class="stat-label">Best day</div><div class="stat-value" style="color:var(--accent2)">${fmtHM(maxDayMs===1?0:maxDayMs)}</div></div>`;

  const canvas=document.getElementById('month-chart-canvas');
  if(monthChartType==='heatmap')  canvas.innerHTML=buildHeatmap(days,today);
  else if(monthChartType==='bar') canvas.innerHTML=buildBarChart(days,labels,today,dayMs,maxDayMs,true);
  else                             canvas.innerHTML=buildStackedChart(days,labels,today,dayMs,maxDayMs,true);

  renderDonut('month-donut-row',days);
  renderBreakdownTable('month-breakdown-table',days);
}

// ─── Chart builders ───────────────────────────────────────────────────────────
function buildBarChart(days,labels,today,dayMs,maxMs,compact=false){
  const gap=compact?'3px':'6px';
  return `<div class="bars-chart" style="gap:${gap}">` +
    days.map((d,i)=>{
      const ms=dayMs[i], h=Math.round((ms/maxMs)*140), isToday=d===today;
      const lbl=compact&&i%5!==0?'':labels[i];
      return `<div class="bar-col" style="min-width:0">
        <div class="bar-body" style="height:${Math.max(h,ms>0?4:0)}px;background:${isToday?'var(--accent)':'var(--accent)55'}">
          <div class="bar-tooltip">${labels[i]}: ${fmtHM(ms)}</div>
        </div>
        <div class="bar-lbl ${isToday?'today-lbl':''}" style="${compact?'font-size:.52rem':''}">${lbl}</div>
      </div>`;
    }).join('') + `</div>`;
}

function buildStackedChart(days,labels,today,dayMs,maxMs,compact=false){
  const gap=compact?'3px':'6px';
  return `<div class="bars-chart" style="gap:${gap}">` +
    days.map((d,i)=>{
      const totalDay=dayMs[i], h=Math.round((totalDay/maxMs)*140), isToday=d===today;
      const lbl=compact&&i%5!==0?'':labels[i];
      const daySess=sessions.filter(s=>s.date===d);
      const bySub={};
      daySess.forEach(s=>{ if(!bySub[s.subjectId])bySub[s.subjectId]={color:s.color,ms:0}; bySub[s.subjectId].ms+=s.duration; });
      const segs=Object.values(bySub).sort((a,b)=>b.ms-a.ms);
      const inner=segs.map(sg=>{ const sh=totalDay?Math.round((sg.ms/totalDay)*h):0; return `<div class="stack-seg" style="height:${sh}px;background:${sg.color};${isToday?'':'opacity:.7'}"></div>`; }).join('');
      return `<div class="bar-col" style="min-width:0">
        <div class="bar-stack" style="height:${Math.max(h,totalDay>0?4:0)}px" title="${fmtHM(totalDay)}">${inner}</div>
        <div class="bar-lbl ${isToday?'today-lbl':''}" style="${compact?'font-size:.52rem':''}">${lbl}</div>
      </div>`;
    }).join('') + `</div>`;
}

function buildLineChart(days,labels,today,dayMs){
  const maxMs=Math.max(...dayMs,1);
  const W=540,H=140,pad=10;
  const pts=dayMs.map((v,i)=>({
    x:pad+(i/(days.length-1||1))*(W-pad*2),
    y:H-pad-(v/maxMs)*(H-pad*2)
  }));
  const path=pts.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ');
  const area=`M${pts[0].x},${H} `+pts.map(p=>`L${p.x},${p.y}`).join(' ')+` L${pts[pts.length-1].x},${H} Z`;
  const dots=pts.map((p,i)=>{ const isToday=days[i]===today; return `<circle cx="${p.x}" cy="${p.y}" r="${isToday?5:3.5}" fill="${isToday?'var(--accent)':'var(--accent3)'}"><title>${labels[i]}: ${fmtHM(dayMs[i])}</title></circle>`; }).join('');
  const axisLabels=pts.map((p,i)=>`<text x="${p.x}" y="${H+14}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="${days[i]===today?'var(--accent)':'var(--muted)'}">${labels[i]}</text>`).join('');
  return `<svg class="line-svg" viewBox="0 0 ${W} ${H+20}" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--accent)" stop-opacity=".3"/><stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#lg)"/>
    <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${axisLabels}
  </svg>`;
}

// ─── Heatmap ──────────────────────────────────────────────────────────────────
function buildHeatmap(days,today){
  const maxMs=Math.max(...days.map(d=>sessions.filter(s=>s.date===d).reduce((a,s)=>a+s.duration,0)),1);
  const first=new Date(days[0]+'T12:00:00');
  const startOffset=(first.getDay()+6)%7;
  const cells=[...Array(startOffset).fill(null),...days];
  while(cells.length%7!==0) cells.push(null);
  const weeks=[];
  for(let i=0;i<cells.length;i+=7) weeks.push(cells.slice(i,i+7));

  // month label offsets
  let monthHtml='';
  weeks.forEach((wk,wi)=>{
    const fd=wk.find(d=>d);
    if(!fd) return;
    const d=new Date(fd+'T12:00:00');
    if(wi===0||d.getDate()<=7){ monthHtml+=`<span style="position:absolute;left:${wi*16}px;white-space:nowrap;font-size:.6rem;color:var(--muted);font-family:'JetBrains Mono',monospace">${d.toLocaleDateString([],{month:'short'})}</span>`; }
  });

  const dayLbls=['Mo','','We','','Fr','','Su'];
  const dayLabelsHtml=dayLbls.map(l=>`<div class="heatmap-day-lbl" style="width:18px;text-align:right;padding-right:4px">${l}</div>`).join('');

  const cols=weeks.map(wk=>{
    const cells2=wk.map(d=>{
      if(!d) return `<div class="heatmap-cell" style="opacity:0;pointer-events:none"></div>`;
      const ms=sessions.filter(s=>s.date===d).reduce((a,s)=>a+s.duration,0);
      const a=ms===0?0:0.15+(ms/maxMs)*0.85;
      const bg=ms===0?'var(--border)':hexAlpha('#7c6aff',a);
      const isToday=d===today;
      const outline=isToday?'outline:2px solid var(--accent2);outline-offset:-1px;':'';
      const label=new Date(d+'T12:00:00').toLocaleDateString([],{month:'short',day:'numeric'});
      return `<div class="heatmap-cell" style="background:${bg};${outline}" title="${label}: ${fmtHM(ms)}"></div>`;
    }).join('');
    return `<div class="heatmap-col">${cells2}</div>`;
  }).join('');

  const legend=[0,.25,.5,.75,1].map(a=>`<div style="width:13px;height:13px;border-radius:3px;background:${a===0?'var(--border)':hexAlpha('#7c6aff',0.15+a*0.85)}"></div>`).join('');

  return `<div style="overflow-x:auto">
    <div style="position:relative;height:16px;margin-left:26px;margin-bottom:6px">${monthHtml}</div>
    <div style="display:flex;align-items:flex-start">
      <div style="display:flex;flex-direction:column;gap:3px;margin-right:2px">${dayLabelsHtml}</div>
      <div style="display:flex;gap:3px">${cols}</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:12px;margin-left:26px">
      <span style="font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted)">Less</span>
      ${legend}
      <span style="font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted)">More</span>
    </div>
  </div>`;
}

// ─── Donut ────────────────────────────────────────────────────────────────────
function renderDonut(id,days){
  const el=document.getElementById(id);
  const entries=bySubjMap(days);
  const total=entries.reduce((a,e)=>a+e.ms,0);
  if(!total){el.innerHTML='<div class="no-sessions" style="padding:8px">No data for this period.</div>';return;}
  const R=60,r=38,cx=80,cy=80;
  let angle=-Math.PI/2;
  const slices=entries.map(e=>{
    const sweep=(e.ms/total)*2*Math.PI;
    const x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    angle+=sweep;
    const x2=cx+R*Math.cos(angle),y2=cy+R*Math.sin(angle);
    const large=sweep>Math.PI?1:0;
    const xi1=cx+r*Math.cos(angle-sweep),yi1=cy+r*Math.sin(angle-sweep);
    const xi2=cx+r*Math.cos(angle),yi2=cy+r*Math.sin(angle);
    return `<path d="M${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} L${xi2.toFixed(2)},${yi2.toFixed(2)} A${r},${r} 0 ${large},0 ${xi1.toFixed(2)},${yi1.toFixed(2)} Z" fill="${e.color}"><title>${e.name}: ${fmtHM(e.ms)}</title></path>`;
  }).join('');
  const legend=entries.slice(0,8).map(e=>`<div class="legend-item"><div class="legend-dot" style="background:${e.color}"></div><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.name}</span><span style="font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--accent3)">${fmtHM(e.ms)}</span><span class="legend-pct">${Math.round((e.ms/total)*100)}%</span></div>`).join('');
  el.innerHTML=`<div class="donut-wrap"><svg class="donut-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">${slices}</svg><div class="donut-center"><div class="donut-center-val">${fmtHM(total)}</div><div class="donut-center-lbl">total</div></div></div><div class="donut-legend">${legend}</div>`;
}

// ─── Breakdown table ──────────────────────────────────────────────────────────
function renderBreakdownTable(id,days){
  const tbl=document.getElementById(id);
  const entries=bySubjMap(days);
  const total=entries.reduce((a,e)=>a+e.ms,0)||1;
  if(!entries.length){tbl.innerHTML='<tr><td colspan="4" style="padding:16px;color:var(--muted);font-size:.85rem">No data.</td></tr>';return;}
  tbl.innerHTML=`<thead><tr><th>Subject</th><th>Time</th><th>Sessions</th><th style="min-width:120px">Share</th></tr></thead><tbody>`+
    entries.map(e=>{
      const pct=Math.round((e.ms/total)*100);
      return `<tr>
        <td><div class="bd-name"><div class="legend-dot" style="background:${e.color}"></div>${e.name}</div></td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--accent3)">${fmtHM(e.ms)}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--muted)">${e.count}</td>
        <td><div style="display:flex;align-items:center;gap:8px"><div class="bd-bar-wrap"><div class="bd-bar-fill" style="width:${pct}%;background:${e.color}"></div></div><span class="bd-pct">${pct}%</span></div></td>
      </tr>`;
    }).join('')+'</tbody>';
}

// ─── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
